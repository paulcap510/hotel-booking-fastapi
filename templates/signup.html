{% extends "layout.html" %}

{% block content %}

<main class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">

      <section class="bg-white rounded-4 shadow-sm p-4 p-md-5">

        <div class="text-center mb-4">
          <h1 class="fw-bold mb-2">Create your account</h1>

          <p class="text-muted mb-0">
            Sign up to manage bookings, view your trips, and save your details.
          </p>
        </div>

        <div
          id="signup-alert"
          class="alert d-none"
          role="alert"
        ></div>

        <form id="signup-form">

          <div class="mb-3">
            <label class="form-label fw-bold">Email address</label>
            <input
              type="email"
              class="form-control form-control-lg"
              id="email"
              name="email"
              placeholder="email@example.com"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <input
              type="text"
              class="form-control form-control-lg"
              id="username"
              name="username"
              placeholder="Choose a username"
              minlength="3"
              maxlength="50"
              required
            >
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              id="password"
              name="password"
              placeholder="Create a password"
              minlength="8"
              required
            >
            <div class="form-text">
              Use at least 8 characters.
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-hotel-confirm btn-lg w-100"
          >
            Create account
          </button>

        </form>

        <hr class="my-4">

        <p class="text-muted text-center mb-0">
          Already have an account?
          <a href="/login" class="fw-bold text-decoration-none">
            Sign in
          </a>
        </p>

      </section>

      <div class="text-center mt-4">
        <p class="text-muted small mb-0">
          By creating an account, you can manage your hotel bookings more easily.
        </p>
      </div>

    </div>
  </div>

</main>

<script>
  const signupForm = document.getElementById("signup-form");
  const signupAlert = document.getElementById("signup-alert");

  signupForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    signupAlert.classList.add("d-none");
    signupAlert.classList.remove("alert-success", "alert-danger");

    const email = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/api/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        username: username,
        password: password
      })
    });

    const data = await response.json();

    if (response.ok) {
      signupAlert.textContent = "Account created successfully. You can now sign in.";
      signupAlert.classList.remove("d-none");
      signupAlert.classList.add("alert-success");

      signupForm.reset();
    } else {
      signupAlert.textContent = data.detail || "Something went wrong. Please try again.";
      signupAlert.classList.remove("d-none");
      signupAlert.classList.add("alert-danger");
    }
  });
</script>

{% endblock content %}
