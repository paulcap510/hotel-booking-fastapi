{% extends "layout.html" %}

{% block content %}

<main class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="mb-4">
        <a href="{{ url_for('host_dashboard') }}" class="text-decoration-none text-muted small">
          &larr; Back to dashboard
        </a>
      </div>

      <h1 class="fw-bold mb-2">Create a new experience</h1>
      <p class="text-muted mb-5">Fill in the details below to list your experience.</p>

      <section class="bg-white rounded-4 shadow-sm p-4 p-md-5">

        <form method="post" action="/experiences/create_experience" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="form-label fw-bold">Experience title</label>
            <input
              type="text"
              class="form-control form-control-lg"
              name="title"
              placeholder="e.g. Sunset Kayaking Tour"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Location</label>
            <input
              type="text"
              class="form-control form-control-lg"
              name="location"
              placeholder="e.g. Boston, MA"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea
              class="form-control"
              name="description"
              rows="4"
              placeholder="Describe the experience — what guests will do, see, and enjoy..."
              required
            ></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Price per person</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text">$</span>
              <input
                type="number"
                class="form-control"
                name="price_per_person"
                min="1"
                placeholder="e.g. 45"
                required
              >
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Image</label>
            <input
              type="file"
              class="form-control"
              name="image"
              accept="image/*"
              required
            >
            <div class="form-text">
                Upload a photo of the experience.
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100">
            Create experience
          </button>

        </form>

      </section>

    </div>
  </div>

</main>

{% endblock content %}
