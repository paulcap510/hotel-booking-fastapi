{% extends "layout.html" %}

{% block content %}

<main class="container py-5" style="max-width: 600px;">

  <div class="mb-4">
    <a href="/host/properties/{{ hotel.id }}/manage" class="text-muted small text-decoration-none">
      ← Back to manage property
    </a>
  </div>

  <h2 class="fw-bold mb-4">Edit room — {{ hotel.name }}</h2>

  <div class="bg-white rounded-4 shadow-sm p-4">
    <form method="post" action="/host/properties/{{ hotel.id }}/rooms/{{ room.id }}/edit">

      <div class="mb-3">
        <label for="room_type" class="form-label">Room type</label>
        <input type="text" class="form-control" id="room_type" name="room_type"
               value="{{ room.room_type }}" required>
      </div>

      <div class="mb-3">
        <label for="price_per_night" class="form-label">Price per night ($)</label>
        <input type="number" class="form-control" id="price_per_night" name="price_per_night"
               value="{{ room.price_per_night }}" min="1" required>
      </div>

      <div class="mb-3">
        <label for="max_guests" class="form-label">Max guests</label>
        <input type="number" class="form-control" id="max_guests" name="max_guests"
               value="{{ room.max_guests }}" min="1" required>
      </div>

      <div class="mb-4">
        <label for="total_inventory" class="form-label">Number of rooms of this type</label>
        <input type="number" class="form-control" id="total_inventory" name="total_inventory"
               value="{{ room.total_inventory }}" min="1" required>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="/host/properties/{{ hotel.id }}/manage" class="btn btn-outline-secondary">Cancel</a>
      </div>

    </form>
  </div>

</main>

{% endblock content %}
