{% extends "layout.html" %}

{% block content %}

<main class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="mb-4">
        <a href="/experiences/{{ experience.id }}" class="text-decoration-none text-muted small">
          &larr; Back to experience
        </a>
      </div>

      <h1 class="fw-bold mb-2">Request to book</h1>
      <p class="text-muted mb-5">{{ experience.title }} — ${{ experience.price_per_person }}/person</p>

      <section class="bg-white rounded-4 shadow-sm p-4 p-md-5">

        <form method="post" action="/experiences/{{ experience.id }}/request">

          <div class="mb-3">
            <label class="form-label fw-bold">Preferred date</label>
            <input
              type="date"
              class="form-control form-control-lg"
              name="requested_date"
              required
            >
          </div>

<div class="mb-3">
  <label class="form-label fw-bold">Number of guests</label>
  <input
    type="number"
    class="form-control form-control-lg"
    name="num_guests"
    id="num-guests"
    min="1"
    value="1"
    required
  >
</div>

<div class="mb-4">
  <p class="text-muted mb-0">
    Total: <span class="fw-bold" id="total-price">${{ experience.price_per_person }}</span>
  </p>
</div>

          <div class="mb-4">
            <label class="form-label fw-bold">Message (optional)</label>
            <textarea
              class="form-control"
              name="message"
              rows="3"
              placeholder="Anything the host should know?"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100">
            Submit request
          </button>

          <p class="text-muted small text-center mt-3 mb-0">
            The host will confirm your request within 24 hours.
          </p>

        </form>

      </section>

    </div>
  </div>

</main>

<!-- Errors here be ignored; they are a basic Jinja + JS bug. Move to JS file later -->
<script>
  const pricePerPerson = {{ experience.price_per_person }};
  const numGuestsInput = document.getElementById("num-guests");
  const totalPriceDisplay = document.getElementById("total-price");

  numGuestsInput.addEventListener("input", function () {
    const numGuests = parseInt(numGuestsInput.value) || 0;
    const total = pricePerPerson * numGuests;
    totalPriceDisplay.textContent = "$" + total;
  });
</script>
{% endblock content %}
