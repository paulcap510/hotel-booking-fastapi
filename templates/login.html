{% extends "layout.html" %}

{% block content %}

<main class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">

      <section class="bg-white rounded-4 shadow-sm p-4 p-md-5">

        <div class="text-center mb-4">
          <h1 class="fw-bold mb-2">Sign in</h1>

          <p class="text-muted mb-0">
            Log in to manage your bookings and view your account.
          </p>
        </div>

        <div
          id="login-alert"
          class="alert d-none"
          role="alert"
        ></div>

        <form id="login-form">

          <div class="mb-3">
            <label class="form-label fw-bold">Email address</label>
            <input
              type="email"
              class="form-control form-control-lg"
              id="email"
              name="email"
              placeholder="email@example.com"
              required
            >
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            >
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-lg w-100 fw-bold py-3"
          >
            Sign in
          </button>

        </form>

        <hr class="my-4">

        <p class="text-muted text-center mb-0">
          Don’t have an account?
          <a href="/signup" class="fw-bold text-decoration-none">
            Create one
          </a>
        </p>

      </section>

      <div class="text-center mt-4">
        <p class="text-muted small mb-0">
          Sign in to keep track of your hotel reservations.
        </p>
      </div>

    </div>
  </div>

</main>

<script>
  const loginForm = document.getElementById("login-form");
  const loginAlert = document.getElementById("login-alert");

  loginForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    loginAlert.classList.add("d-none");
    loginAlert.classList.remove("alert-success", "alert-danger");

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const formData = new URLSearchParams();
    formData.append("username", email);
    formData.append("password", password);

    const response = await fetch("/api/users/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: formData
    });

    const data = await response.json();

    if (response.ok) {
      loginAlert.textContent = "Login successful.";
      loginAlert.classList.remove("d-none");
      loginAlert.classList.add("alert-success");

      window.location.href = "/";
    } else {
      loginAlert.textContent = data.detail || "Incorrect email or password.";
      loginAlert.classList.remove("d-none");
      loginAlert.classList.add("alert-danger");
    }
  });
</script>

{% endblock content %}
