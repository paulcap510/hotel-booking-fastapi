<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hot Hotels</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --hotels-navy: #060b3f;
        --hotels-blue: #11185c;
        --hotels-red: #e61e2a;
        --hotels-light: #f5f7fb;
        --hotels-border: #c7cbd8;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: var(--hotels-light);
        color: #111;
      }

      .site-navbar {
        background-color: var(--hotels-navy);
        padding: 1rem 0;
      }

      .brand-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background-color: var(--hotels-red);
        color: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        margin-right: 0.6rem;
      }

      .navbar-brand {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -1px;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.9) !important;
        font-weight: 600;
        margin: 0 0.4rem;
      }

      .nav-link:hover {
        color: #ffffff !important;
      }

      .nav-pill {
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 999px;
        padding: 0.45rem 1rem !important;
      }

      .hero {
        min-height: 500px;
        background:
          linear-gradient(
            rgba(0, 0, 0, 0.25),
            rgba(0, 0, 0, 0.25)
          ),
          linear-gradient(120deg, #2b160d, #8a562f);
        display: flex;
        align-items: center;
        position: relative;
      }

      .hero-title {
        color: white;
        font-size: clamp(2.3rem, 5vw, 4rem);
        font-weight: 800;
        text-align: center;
        margin-bottom: 2.5rem;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      }

      .search-card {
        background: white;
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
        max-width: 1100px;
        margin: 0 auto;
      }

      .search-input-box {
        border: 1.5px solid var(--hotels-border);
        border-radius: 12px;
        min-height: 72px;
        padding: 0.7rem 1rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: white;
      }

      .search-input-box label {
        font-size: 0.85rem;
        font-weight: 800;
        color: var(--hotels-blue);
        margin-bottom: 0.2rem;
      }

      .search-input-box input {
        border: none;
        padding: 0;
        font-size: 1.1rem;
        font-weight: 500;
      }

      .search-input-box input:focus {
        box-shadow: none;
        outline: none;
      }

      .search-btn {
        background-color: var(--hotels-navy);
        border: none;
        border-radius: 999px;
        min-height: 72px;
        font-size: 1.3rem;
        font-weight: 800;
      }

      .search-btn:hover {
        background-color: #10175c;
      }

      .business-check {
        margin-top: 1.4rem;
        font-weight: 600;
        color: var(--hotels-blue);
      }

      .hotel-card {
        border: none;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      }

      .hotel-img-placeholder {
        height: 160px;
        background: linear-gradient(135deg, #d9dde8, #aab3c7);
      }

      @media (max-width: 768px) {
        .search-card {
          padding: 1.25rem;
        }

        .hero {
          min-height: 620px;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark site-navbar">
      <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <span class="brand-icon">H</span>
          Hot Hotels
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-4 me-auto">
          </ul>
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link" href="#">List your property</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Support</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Trips</a>
            </li>

            {% if not request.state.user %}
            <li class="nav-item">
              <a class="nav-link" href="/login">Sign in</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-outline-light btn-sm ms-lg-2" href="/signup">
                Create account
              </a>
            </li>
            {% else %}
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Hi, {{ request.state.user.username }}
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">My account</a></li>
                <li><a class="dropdown-item" href="{{ url_for ('my_bookings_page' )}}">My bookings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <button class="dropdown-item" type="button" id="logout-button">
                    Sign out
                  </button>
                </li>
              </ul>
            </li>
            {% endif %}
          </ul>


        </div>
      </div>
    </nav>

    {% block content %}
    {% endblock content %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const logoutButton = document.getElementById("logout-button");
      if (logoutButton) {
        logoutButton.addEventListener("click", async function () {
          await fetch("/api/users/logout", { method: "POST" });
          window.location.href = "/";
        });
      }
    </script>
  </body>
</html>
