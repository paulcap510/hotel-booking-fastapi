{% extends "layout.html" %}

{% block content %}

<main class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">

      <section class="bg-white rounded-4 shadow-sm p-4 p-md-5">

        {% if error %}

        <div class="text-center">
          <h1 class="fw-bold mb-2">Link expired</h1>
          <p class="text-muted mb-4">{{ error }}</p>
          <a href="/account/forgot-password" class="btn btn-primary">
            Request a new link
          </a>
        </div>

        {% else %}

        <div class="text-center mb-4">
          <h1 class="fw-bold mb-2">Set new password</h1>
          <p class="text-muted mb-0">
            Choose a new password for your account.
          </p>
        </div>

        <form method="post" action="/account/reset-password">

          <input type="hidden" name="token" value="{{ token }}">

          <div class="mb-4">
            <label class="form-label fw-bold">New password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              name="new_password"
              placeholder="Enter new password"
              minlength="8"
              required
            >
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Confirm new password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              name="confirm_password"
              placeholder="Confirm new password"
              minlength="8"
              required
            >
          </div>


            {% if password_error %}
            <div class="alert alert-danger mb-3">{{ password_error }}</div>
            {% endif %}

          <button type="submit" class="btn btn-primary btn-lg w-100">
            Save new password
          </button>

        </form>

        {% endif %}

      </section>

      <div class="text-center mt-4">
        <a href="/login" class="text-decoration-none fw-bold">
          &larr; Back to sign in
        </a>
      </div>

    </div>
  </div>

</main>

{% endblock content %}
